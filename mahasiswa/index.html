<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Tugas Rio Ananda</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; background-color: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 10px; display: inline-block; box-shadow: 0 4px 8px rgba(0,0,0,0.1); min-width: 300px; }
        h1 { color: #2c3e50; }
        .status-aktif { color: green; font-weight: bold; }
        .data-item { text-transform: capitalize; } /* Membuat huruf depan kategori jadi kapital */
    </style>
</head>
<body>
    <div class="card">
        <h1>🚀 Website Rio Ananda Berhasil Online!</h1>
        <p>Tugas Pemrograman Perangkat Bergerak</p>
        <hr>
        <p>Status Hosting: <b>Aktif</b></p>
        
        <div id="tempat-data" style="text-align: left; margin: 15px 0;">
            <p>Loading data...</p>
        </div>
        <hr>

        <p>Status Database: <span id="db-status">Menghubungkan...</span></p>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
      import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js";

      const firebaseConfig = {
        apiKey: "AIzaSyBunZW4_QJ1Vx2tFOxs6_D1KjoYIXEd828",
        authDomain: "tugas-rio.firebaseapp.com",
        projectId: "tugas-rio",
        storageBucket: "tugas-rio.firebasestorage.app",
        messagingSenderId: "736666765374",
        appId: "1:736666765374:web:3b7cc53a2df7830a96e96f",
        databaseURL: "https://tugas-rio-default-rtdb.asia-southeast1.firebasedatabase.app/" 
      };

      try {
          const app = initializeApp(firebaseConfig);
          const db = getDatabase(app); 
          const dbRef = ref(db);
          
          onValue(dbRef, (snapshot) => {
            const data = snapshot.val();
            const wadahData = document.getElementById("tempat-data");
            
            // Kosongkan ruangan sebelum diisi data baru
            wadahData.innerHTML = ""; 

            if (data) {
              // LOOPING: Baca semua data di Firebase satu per satu
              for (const [kategori, isi] of Object.entries(data)) {
                  // Generate HTML otomatis untuk setiap data yang ditemukan
                  wadahData.innerHTML += `<p class="data-item">${kategori}: <b>${isi}</b></p>`;
              }
              
              document.getElementById("db-status").innerText = "Terhubung & Data Tampil! ✅";
              document.getElementById("db-status").className = "status-aktif";
            } else {
              wadahData.innerHTML = "<p>Database masih kosong.</p>";
            }
          });

      } catch (error) {
          document.getElementById("db-status").innerText = "Gagal terhubung ❌";
          console.error("Error Firebase:", error);
      }
    </script>
</body>
</html>
